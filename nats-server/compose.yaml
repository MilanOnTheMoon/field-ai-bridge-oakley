
# Docker compose file for nats-server
# docker compose up -d

services:
  nats-server:
    image: nats:latest
    container_name: nats-server
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    restart: unless-stopped

  nats-box:
    image: natsio/nats-box
    container_name: nats-box
    stdin_open: true
    tty: true
    restart: unless-stopped
    network_mode: host
    depends_on:
      - nats-server
