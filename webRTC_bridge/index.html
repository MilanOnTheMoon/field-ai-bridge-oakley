<!DOCTYPE html>
<html>
<head>
    <title>ROS WebRTC Stream</title>
</head>
<body>
    <h2>ROS Image Topic WebRTC Stream</h2>
    <button id="start">Start Stream</button>
    <br><br>
    <video id="video" autoplay playsinline style="border: 1px solid black; width: 640px; height: 480px;"></video>

    <script>
        const startButton = document.getElementById('start');
        const videoElement = document.getElementById('video');
        let pc = new RTCPeerConnection();

        // When the WebRTC connection provides a track, attach it to the video element
        pc.addEventListener('track', (evt) => {
            if (evt.track.kind === 'video') {
                videoElement.srcObject = evt.streams[0];
            }
        });

        // Ensure we request to receive video
        pc.addTransceiver('video', { direction: 'recvonly' });

        startButton.addEventListener('click', async () => {
            // Create an offer to send to the ROS node
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Send the offer to the Python signaling server
            const response = await fetch('http://localhost:8080/offer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sdp: pc.localDescription.sdp,
                    type: pc.localDescription.type
                })
            });

            // Parse the answer and set it as the remote description
            const answer = await response.json();
            await pc.setRemoteDescription(answer);
        });
    </script>
</body>
</html>
