name: FieldAI Bridge

on:
  pull_request:
    paths:
      - 'nats_bridge/**'
  push:
    branches:
      - main
    paths:
      - 'nats_bridge/**'
  schedule:
    - cron: "0 3 * * 1"

jobs:
  fieldai-nats-bridge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fieldai-nats-bridge:latest
